syntax = "proto3";

package constellation;

option go_package = "github.com/constellation/proto";

// ─── Empty ───────────────────────────────────────────────────────────────────

message Empty {}

// ─── Enums ───────────────────────────────────────────────────────────────────

enum TaskStatus {
  TASK_STATUS_UNKNOWN = 0;
  TASK_STATUS_SUBMITTED = 1;
  TASK_STATUS_QUEUED = 2;
  TASK_STATUS_SPLITTING = 3;
  TASK_STATUS_SCHEDULED = 4;
  TASK_STATUS_TRANSFERRING = 5;
  TASK_STATUS_RUNNING = 6;
  TASK_STATUS_COMPLETED = 7;
  TASK_STATUS_FAILED = 8;
  TASK_STATUS_CANCELLED = 9;
}

enum Priority {
  PRIORITY_UNKNOWN = 0;
  PRIORITY_LOW = 1;
  PRIORITY_NORMAL = 2;
  PRIORITY_HIGH = 3;
  PRIORITY_CRITICAL = 4;
}

enum NodeStatus {
  NODE_STATUS_UNKNOWN = 0;
  NODE_STATUS_ONLINE = 1;
  NODE_STATUS_OFFLINE = 2;
  NODE_STATUS_DRAINING = 3;
  NODE_STATUS_MAINTENANCE = 4;
  NODE_STATUS_DISCOVERED = 5;
}

enum NodeRole {
  NODE_ROLE_UNKNOWN = 0;
  NODE_ROLE_CONTROLLER = 1;
  NODE_ROLE_WORKER = 2;
}

enum Runtime {
  RUNTIME_BARE = 0;
  RUNTIME_DOCKER = 1;
}

enum SplitStrategy {
  SPLIT_NONE = 0;
  SPLIT_CHUNK = 1;
  SPLIT_MAP_REDUCE = 2;
  SPLIT_PIPELINE = 3;
  SPLIT_REPLICATED = 4;
}

// ─── Resource Types ──────────────────────────────────────────────────────────

message ResourceRequirements {
  uint32 cpu_cores = 1;
  uint64 memory_bytes = 2;
  uint64 disk_bytes = 3;
  string docker_image = 4;
  Runtime runtime = 5;
  uint32 gpu_count = 6;
  uint64 gpu_memory_bytes = 7;
}

message GpuInfo {
  string uuid = 1;
  string name = 2;
  uint64 memory_total = 3;
  uint64 memory_free = 4;
}

message CpuInfo {
  string model = 1;
  string vendor = 2;
  uint32 physical_cores = 3;
  uint32 logical_cores = 4;
  double frequency_mhz = 5;
  string architecture = 6;
}

message MemoryInfo {
  uint64 total_bytes = 1;
  uint64 available_bytes = 2;
  uint64 used_bytes = 3;
  uint64 cached_bytes = 4;
  uint64 swap_total_bytes = 5;
  uint64 swap_used_bytes = 6;
}

message DiskInfo {
  string device = 1;
  string mount_point = 2;
  string filesystem = 3;
  uint64 total_bytes = 4;
  uint64 used_bytes = 5;
  uint64 available_bytes = 6;
  string disk_type = 7; // SSD, HDD, NVMe
}

message NetworkInfo {
  string name = 1;
  string ip_address = 2;
  string mac_address = 3;
  uint64 speed_mbps = 4;
  bool is_up = 5;
}

message OsInfo {
  string name = 1;
  string version = 2;
  string kernel_version = 3;
  string architecture = 4;
  string hostname = 5;
}

message SoftwareInfo {
  string name = 1;
  string version = 2;
  string path = 3;
}

message ProcessInfo {
  uint32 pid = 1;
  string name = 2;
  string command = 3;
  string user = 4;
  double cpu_percent = 5;
  double memory_percent = 6;
  uint64 memory_bytes = 7;
  string status = 8;
}

// ─── Task Types ──────────────────────────────────────────────────────────────

message TaskID {
  string id = 1;
}

message TaskRequest {
  string task_id = 1;
  string name = 2;
  string command = 3;
  ResourceRequirements resources = 4;
  Priority priority = 5;
  int32 retry_max = 6;
  int32 timeout_seconds = 7;
  map<string, string> env_vars = 8;
  string working_dir = 9;
  string input_file = 10;
  string output_dir = 11;
  bool is_distributed = 12;
  int32 world_size = 13;
  string gang_id = 14;
}

message TaskProgress {
  string task_id = 1;
  TaskStatus status = 2;
  double progress_percent = 3;
  string log_line = 4;
  int32 exit_code = 5;
  string error_message = 6;
  int64 timestamp_unix = 7;
}

message TaskInfo {
  string id = 1;
  string name = 2;
  TaskStatus status = 3;
  string command = 4;
  Runtime runtime = 5;
  string docker_image = 6;
  ResourceRequirements resources = 7;
  Priority priority = 8;
  int32 retry_max = 9;
  int32 retry_count = 10;
  int32 timeout_seconds = 11;
  string assigned_node = 12;
  int32 exit_code = 13;
  string error_message = 14;
  string submitted_by = 15;
  int64 created_at = 16;
  int64 started_at = 17;
  int64 completed_at = 18;
  SplitStrategy split_strategy = 19;
  repeated TaskChunkInfo chunks = 20;
  bool is_distributed = 21;
  int32 world_size = 22;
  string gang_id = 23;
}

message TaskChunkInfo {
  string chunk_id = 1;
  string parent_task_id = 2;
  int32 chunk_index = 3;
  string assigned_node = 4;
  TaskStatus status = 5;
  string input_file = 6;
  string output_file = 7;
  int32 exit_code = 8;
  int64 started_at = 9;
  int64 completed_at = 10;
}

// ─── File Transfer ───────────────────────────────────────────────────────────

message FileChunk {
  string filename = 1;
  bytes data = 2;
  int64 offset = 3;
  int64 total_size = 4;
  bool is_last = 5;
}

message FileReceipt {
  string filename = 1;
  int64 bytes_received = 2;
  bool success = 3;
  string error = 4;
}

message FileRequest {
  string filename = 1;
}

// ─── Heartbeat ───────────────────────────────────────────────────────────────

message HeartbeatRequest {
  string node_id = 1;
  double cpu_usage_percent = 2;
  double memory_usage_percent = 3;
  double disk_usage_percent = 4;
  double load_avg_1 = 5;
  double load_avg_5 = 6;
  double load_avg_15 = 7;
  uint32 running_tasks = 8;
  int64 uptime_seconds = 9;
  double cpu_temperature = 10;
}

message HeartbeatResponse {
  bool acknowledged = 1;
  int64 server_time_unix = 2;
}
